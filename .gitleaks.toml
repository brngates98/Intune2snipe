    "your-certificate-content-here",
    "MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC",
    "MIIDXTCCAkWgAwIBAgIJAKJ",
    "your-snipeit.example.com",
