{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intune2snipe.secretName" . }}
  labels:
    {{- include "intune2snipe.labels" . | nindent 4 }}
type: Opaque
stringData:
  AZURE_TENANT_ID: {{ required "secrets.stringData.azureTenantId is required when secrets.create is true" .Values.secrets.stringData.azureTenantId | quote }}
  AZURE_CLIENT_ID: {{ required "secrets.stringData.azureClientId is required when secrets.create is true" .Values.secrets.stringData.azureClientId | quote }}
  AZURE_CLIENT_SECRET: {{ required "secrets.stringData.azureClientSecret is required when secrets.create is true" .Values.secrets.stringData.azureClientSecret | quote }}
  SNIPEIT_URL: {{ required "secrets.stringData.snipeitUrl is required when secrets.create is true (must end with /api/v1)" .Values.secrets.stringData.snipeitUrl | quote }}
  SNIPEIT_API_TOKEN: {{ required "secrets.stringData.snipeitApiToken is required when secrets.create is true" .Values.secrets.stringData.snipeitApiToken | quote }}
  SNIPEIT_DEFAULT_STATUS: {{ required "secrets.stringData.snipeitDefaultStatus is required when secrets.create is true" .Values.secrets.stringData.snipeitDefaultStatus | quote }}
  {{- with .Values.secrets.stringData.azureGroupIds }}
  AZURE_GROUP_IDS: {{ . | quote }}
  {{- end }}
{{- end }}
