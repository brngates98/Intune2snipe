# Default values for intune2snipe — Intune → Snipe-IT sync CronJob
# https://github.com/brngates98/intune2snipe/tree/main/charts/intune2snipe
#
# Credentials: either set secrets.create=true and fill secrets.stringData below, or
# keep secrets.create=false and provide an existing Secret (secrets.existingSecret).
# Never commit real secrets to git — use -f secrets.yaml, CI variables, or External Secrets.

# ------------------------------------------------------------------------------
# Sync behavior (maps to python app.py CLI flags)
# ------------------------------------------------------------------------------
sync:
  # Preview only — no writes to Snipe-IT
  dryRun: false

  # Device OS filter: all | windows | android | ios | macos
  platform: all

  # Optional Azure AD group object IDs (comma-separated), passed as --groups.
  # Leave empty to rely on AZURE_GROUP_IDS in the Secret, or set only one source.
  groups: ""

  # Optional: user (default) or location
  checkoutMode: ""

  # UPN prefix length for location checkout (maps to SNIPEIT_LOCATION_PREFIX_LENGTH).
  locationPrefixLength: ""

  # Resolve assignee from Graph primary user (maps to GRAPH_USE_PRIMARY_USER).
  usePrimaryUser: false

  # Extra raw arguments appended after dryRun/platform/groups (advanced)
  extraArgs: []
  # - "--some-future-flag"

# ------------------------------------------------------------------------------
# CronJob (schedule and job policy)
# ------------------------------------------------------------------------------
cronjob:
  # Cron schedule (UTC unless timeZone is set)
  schedule: "0 2 * * *"

  # Kubernetes 1.27+: IANA time zone name (e.g. "America/Chicago"). Empty = UTC per cluster.
  timeZone: ""

  # Pause scheduled runs without uninstalling
  suspend: false

  # Seconds after the scheduled time the job may still start; omit to use cluster default
  startingDeadlineSeconds: null

  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  restartPolicy: OnFailure

  # Optional metadata on the CronJob resource
  annotations: {}
  labels: {}

# ------------------------------------------------------------------------------
# Container image
# ------------------------------------------------------------------------------
image:
  repository: ghcr.io/brngates98/intune2snipe
  # Image tag (e.g. semver from a release). Defaults to Chart.appVersion if empty.
  tag: ""
  # If set, pulls by digest and ignores tag (e.g. "sha256:abcd...")
  digest: ""
  pullPolicy: Always

imagePullSecrets: []
# - name: ghcr-secret

# ------------------------------------------------------------------------------
# Pod (template spec)
# ------------------------------------------------------------------------------
pod:
  annotations: {}
  labels: {}

# Pod-level securityContext (spec.template.spec.securityContext)
podSecurityContext: {}

# Container-level securityContext
containerSecurityContext: {}

# ------------------------------------------------------------------------------
# Resources
# ------------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ------------------------------------------------------------------------------
# Scheduling (optional)
# ------------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# ------------------------------------------------------------------------------
# Credentials (see docs/configuration.md for each variable)
# ------------------------------------------------------------------------------
secrets:
  # If true, chart creates a Secret from secrets.stringData (name: secrets.name or <fullname>-secrets)
  create: false

  # Optional fixed name for the created Secret (default: "<fullname>-secrets", e.g. myrel-intune2snipe-secrets)
  name: ""

  # When create is false: use this existing Secret in the namespace
  existingSecret: intune2snipe-secrets

  # Used when secrets.create is true — maps to app.py environment variables
  stringData:
    azureTenantId: ""
    azureClientId: ""
    azureClientSecret: ""
    # Must include /api/v1 (e.g. https://snipe.example.com/api/v1)
    snipeitUrl: ""
    snipeitApiToken: ""
    snipeitDefaultStatus: "Ready to Deploy"
    # Optional; user (default) or location
    snipeitCheckoutMode: ""
    # Optional; prefix length for location checkout (default in app: 3)
    snipeitLocationPrefixLength: ""
    # Optional; status label on checkout / checkin (defaults to snipeitDefaultStatus)
    snipeitCheckoutStatus: ""
    snipeitCheckinStatus: ""
    # Optional; set to "true" for GRAPH_USE_PRIMARY_USER
    graphUsePrimaryUser: ""
    # Optional; Snipe company id for multi-tenant CMDB
    snipeitCompanyId: ""
    # Optional; comma-separated group object IDs (same as AZURE_GROUP_IDS)
    azureGroupIds: ""

# Legacy alias (deprecated): if non-empty, used when secrets.existingSecret is empty and secrets.create is false
existingSecret: ""

# ------------------------------------------------------------------------------
# Helm / Kubernetes naming
# ------------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# ------------------------------------------------------------------------------
# Deprecated (will be removed): use sync.extraArgs instead
# ------------------------------------------------------------------------------
extraArgs: []
